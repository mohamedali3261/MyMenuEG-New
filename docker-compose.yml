services:
  # ── MySQL Database ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: mymenueg_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d  # optional: seed SQL files
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend (Node.js Express) ─────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mymenueg_backend
    restart: unless-stopped
    env_file:
      - ./backend/server/.env
    environment:
      # Override DB URL to point to the mysql container
      DATABASE_URL: mysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      NODE_ENV: production
      PORT: 5000
    volumes:
      - uploads_data:/app/backend/public/uploads
      - ./backend/logs:/app/backend/logs
    networks:
      - app_network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend (React + nginx serving static files) ─────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mymenueg_frontend
    restart: unless-stopped
    networks:
      - app_network

  # ── Nginx Reverse Proxy (main entry point) ────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: mymenueg_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro           # SSL certs (optional)
      - nginx_logs:/var/log/nginx
    networks:
      - app_network
    depends_on:
      - frontend
      - backend

# ── Named Volumes ─────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  nginx_logs:
    driver: local

# ── Internal Network ──────────────────────────────────────────────
networks:
  app_network:
    driver: bridge
