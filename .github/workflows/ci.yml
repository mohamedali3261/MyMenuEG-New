name: MyMenuEG CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mymenueg_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Generate Prisma Client
      run: cd backend/server && npx prisma generate

    - name: Run Lint
      run: npm run lint

    - name: Run Tests
      run: npm test
      env:
        DATABASE_URL: "mysql://root:root@localhost:3306/mymenueg_test"
        JWT_SECRET: "test-secret-must-be-long-enough-32-chars"
        NODE_ENV: test

    - name: Build
      run: npm run build
